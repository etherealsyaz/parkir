services:
  web-fajrina-1:
    build: .
    container_name: web-fajrina-1
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      DB_HOST: db-fajrina
      DB_DATABASE: parkir_fajrina
      DB_USERNAME: root
      DB_PASSWORD: fajrina_secret123
    depends_on:
      - db-fajrina
    networks:
      - asat-net

  web-fajrina-2:
    build: .
    container_name: web-fajrina-2
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      DB_HOST: db-fajrina
      DB_DATABASE: parkir_fajrina
      DB_USERNAME: root
      DB_PASSWORD: fajrina_secret123
    depends_on:
      - db-fajrina
    networks:
      - asat-net

  web-fajrina-3:
    build: .
    container_name: web-fajrina-3
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      DB_HOST: db-fajrina
      DB_DATABASE: parkir_fajrina
      DB_USERNAME: root
      DB_PASSWORD: fajrina_secret123
    depends_on:
      - db-fajrina
    networks:
      - asat-net

  db-fajrina:
    image: mysql:8.0
    container_name: db-fajrina
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: fajrina_secret123
      MYSQL_DATABASE: parkir_fajrina
    ports:
      - "33061:3306"
    volumes:
      - asat-vol:/var/lib/mysql
    networks:
      - asat-net

networks:
  asat-net:
    driver: bridge

volumes:
  asat-vol:
